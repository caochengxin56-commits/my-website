<!DOCTYPE html>
<html lang="zh-CN" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>捐助信息填写 | AidSpring Foundation</title>
    <meta
      name="description"
      content="AidSpring Foundation 捐助信息填写页面，支持选择金额并进入支付方式页面。"
    />
    <style>
      :root {
        --bg: #f5ecde;
        --bg-deep: #ecd6b2;
        --panel: rgba(255, 248, 239, 0.97);
        --panel-soft: #fff9f1;
        --text: #26190f;
        --muted: #6f5a47;
        --line: rgba(85, 59, 37, 0.12);
        --line-strong: rgba(15, 91, 69, 0.26);
        --green: #0f5b45;
        --green-soft: #217058;
        --gold: #d9ab55;
        --gold-strong: #c99231;
        --shadow: 0 18px 46px rgba(48, 25, 10, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 18px 14px 28px;
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC",
          "Source Han Sans SC", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top right, rgba(217, 171, 85, 0.28), transparent 32%),
          radial-gradient(circle at bottom left, rgba(15, 91, 69, 0.12), transparent 28%),
          linear-gradient(180deg, #f7eddc 0%, #f3e6d2 45%, #e8d0b4 100%);
      }

      a {
        color: inherit;
      }

      .page-shell {
        position: relative;
        z-index: 1;
        width: min(100%, 430px);
        margin: 0 auto;
      }

      .page-glow {
        position: fixed;
        width: 16rem;
        height: 16rem;
        border-radius: 50%;
        filter: blur(32px);
        opacity: 0.45;
        pointer-events: none;
        z-index: 0;
      }

      .page-glow-top {
        top: -4rem;
        left: -5rem;
        background: rgba(255, 215, 153, 0.8);
      }

      .page-glow-bottom {
        right: -5rem;
        bottom: 4rem;
        background: rgba(15, 91, 69, 0.18);
      }

      .modal-stage {
        position: relative;
        min-height: 520px;
      }

      .background-page {
        overflow: hidden;
        min-height: 680px;
        border-radius: 30px;
        background: rgba(255, 248, 239, 0.72);
        border: 1px solid rgba(85, 59, 37, 0.08);
        box-shadow: var(--shadow);
        filter: blur(1px);
        opacity: 0.62;
      }

      .background-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 14px;
      }

      .background-brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
        padding: 5px;
        border-radius: 14px;
        background: linear-gradient(145deg, var(--green) 0%, #08382b 100%);
        box-shadow: 0 12px 26px rgba(15, 91, 69, 0.2);
      }

      .brand-mark img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .background-brand h1 {
        margin: 0;
        font-size: 0.96rem;
        line-height: 1.2;
        font-weight: 800;
        color: var(--text);
      }

      .background-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 42px;
        min-height: 38px;
        padding: 0 12px;
        border-radius: 14px;
        background: rgba(255, 248, 239, 0.72);
        border: 1px solid rgba(85, 59, 37, 0.08);
        text-decoration: none;
        font-weight: 700;
        font-size: 0.88rem;
        color: var(--green);
      }

      .background-hero {
        min-height: 220px;
        margin: 0 14px;
        border-radius: 26px;
        background:
          linear-gradient(180deg, rgba(10, 21, 19, 0.08) 0%, rgba(10, 21, 19, 0.46) 48%, rgba(15, 29, 25, 0.9) 100%),
          url("./download.png") center center / cover;
        box-shadow: var(--shadow);
      }

      .background-copy {
        display: grid;
        gap: 10px;
        padding: 18px 16px 0;
      }

      .background-pill {
        display: inline-flex;
        align-items: center;
        padding: 5px 10px;
        border-radius: 999px;
        background: rgba(255, 248, 239, 0.72);
        color: var(--green);
        font-size: 0.74rem;
        font-weight: 800;
      }

      .background-copy h2 {
        margin: 0;
        font-size: 1.04rem;
        line-height: 1.45;
      }

      .background-copy p {
        margin: 0;
        color: var(--muted);
        font-size: 0.84rem;
        line-height: 1.7;
      }

      .donation-modal {
        position: absolute;
        top: 72px;
        left: 50%;
        right: auto;
        width: calc(100% - 20px);
        padding: 18px 16px 16px;
        border-radius: 26px;
        background: var(--panel);
        border: 1px solid rgba(85, 59, 37, 0.08);
        box-shadow: var(--shadow);
        transform: translateX(-50%) scale(0.78);
        transform-origin: top center;
      }

      .modal-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .modal-header h3 {
        margin: 0;
        font-size: 1.42rem;
        line-height: 1.26;
        color: var(--green);
      }

      .modal-header p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.86rem;
        line-height: 1.65;
      }

      .close-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 42px;
        height: 42px;
        border-radius: 14px;
        background: rgba(15, 91, 69, 0.08);
        text-decoration: none;
        font-size: 1.2rem;
        font-weight: 900;
        color: var(--green);
        flex-shrink: 0;
      }

      .summary-strip {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 14px;
      }

      .summary-box {
        padding: 12px;
        border-radius: 18px;
        background: var(--panel-soft);
        border: 1px solid var(--line);
      }

      .summary-box span {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 700;
      }

      .summary-box strong {
        display: block;
        color: var(--green);
        font-size: 0.98rem;
        line-height: 1.35;
      }

      .donation-form {
        display: grid;
        gap: 13px;
      }

      .field-group {
        display: grid;
        gap: 8px;
      }

      .field-label {
        color: var(--green);
        font-size: 0.9rem;
        font-weight: 800;
      }

      .amount-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .amount-chip {
        min-height: 44px;
        border: 1.5px solid var(--line);
        border-radius: 18px;
        background: rgba(15, 91, 69, 0.06);
        color: var(--green);
        font-size: 0.92rem;
        font-weight: 800;
      }

      .amount-chip.is-active {
        border-color: var(--line-strong);
        background: rgba(217, 171, 85, 0.18);
        box-shadow: inset 0 0 0 1px rgba(217, 171, 85, 0.08);
      }

      .field-input,
      .field-textarea {
        width: 100%;
        border: 1.5px solid var(--line);
        border-radius: 18px;
        background: #fff;
        color: var(--text);
        font: inherit;
        padding: 14px 16px;
        outline: none;
      }

      .field-input {
        min-height: 50px;
      }

      .field-textarea {
        min-height: 112px;
        resize: vertical;
      }

      .field-input:focus,
      .field-textarea:focus {
        border-color: var(--line-strong);
        box-shadow: 0 0 0 3px rgba(15, 91, 69, 0.08);
      }

      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--green);
        font-weight: 700;
        font-size: 0.92rem;
      }

      .checkbox-row input {
        width: 22px;
        height: 22px;
        accent-color: var(--green);
      }

      .cta-btn {
        min-height: 50px;
        border: 0;
        border-radius: 18px;
        background: linear-gradient(135deg, var(--gold), var(--gold-strong));
        color: #fff;
        font-size: 1rem;
        font-weight: 900;
        letter-spacing: 0.01em;
      }

      .form-note {
        margin: 0;
        color: var(--muted);
        font-size: 0.8rem;
        line-height: 1.65;
      }

      .site-footer-nav {
        margin-top: 22px;
        padding: 20px 16px 16px;
        border-radius: 24px;
        background: rgba(255, 248, 239, 0.92);
        border: 1px solid rgba(85, 59, 37, 0.1);
        box-shadow: 0 16px 36px rgba(48, 25, 10, 0.08);
      }

      .site-footer-logo {
        display: block;
        width: 92px;
        height: 92px;
        margin: 0 auto 10px;
        object-fit: contain;
      }

      .site-footer-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .site-footer-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 12px;
        border-radius: 16px;
        border: 1px solid rgba(85, 59, 37, 0.1);
        background: rgba(255, 250, 242, 0.95);
        color: var(--green);
        text-decoration: none;
        font-size: 0.92rem;
        font-weight: 700;
      }

      .site-footer-btn:last-child:nth-child(odd) {
        grid-column: 1 / -1;
      }

      @media (max-width: 360px) {
        .summary-strip,
        .amount-grid,
        .site-footer-grid {
          grid-template-columns: 1fr;
        }

        .donation-modal {
          position: relative;
          top: auto;
          left: 50%;
          right: auto;
          margin-top: -80px;
          width: calc(100% - 20px);
          transform: translateX(-50%) scale(0.78);
        }

        .modal-header h3 {
          font-size: 1.28rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-glow page-glow-top"></div>
    <div class="page-glow page-glow-bottom"></div>
    <main class="page-shell">
      <section class="modal-stage">
        <div class="background-page" aria-hidden="true">
          <div class="background-topbar">
            <div class="background-brand">
              <span class="brand-mark">
                <img src="./慈善募捐网站logo设计.png" alt="AidSpring Foundation logo" />
              </span>
              <h1>AidSpring Foundation</h1>
            </div>
            <a class="background-link" href="./index.html">首页</a>
          </div>
          <div class="background-hero"></div>
          <div class="background-copy">
            <span class="background-pill">项目详情页</span>
            <h2 id="heroProjectName">正在读取募捐项目</h2>
            <p>我们把正在等待治疗、治疗与基本援助的项目集中展示，让每一份善意更快抵达真正需要帮助的人。</p>
            <p>点击捐助后，当前页面会以弹窗形式收集捐助信息，并在下一步进入支付方式确认。</p>
          </div>
        </div>

        <section class="donation-modal">
        <div class="modal-header">
          <div>
            <h3 id="modalTitle">支持这个募捐项目</h3>
            <p>每一份善意都将被记录，并用于推动项目当前所需的治疗或援助工作。</p>
          </div>
          <a class="close-link" id="closeLink" href="./index.html" aria-label="关闭">×</a>
        </div>

        <div class="summary-strip">
          <div class="summary-box">
            <span>当前项目</span>
            <strong id="summaryProjectName">正在读取项目名称...</strong>
          </div>
          <div class="summary-box">
            <span>当前金额</span>
            <strong id="summaryAmount">请选择捐助金额</strong>
          </div>
        </div>

        <form class="donation-form" id="donationForm" novalidate>
          <input type="hidden" id="hiddenSlug" name="slug" />
          <input type="hidden" id="hiddenProject" name="project" />

          <div class="field-group">
            <label class="field-label">捐助金额</label>
            <div class="amount-grid" id="amountGrid">
              <button class="amount-chip" type="button" data-amount="50">US$ 50</button>
              <button class="amount-chip" type="button" data-amount="100">US$ 100</button>
              <button class="amount-chip" type="button" data-amount="300">US$ 300</button>
              <button class="amount-chip" type="button" data-amount="500">US$ 500</button>
            </div>
            <input
              class="field-input"
              id="customAmount"
              name="amount"
              type="number"
              min="1"
              step="1"
              inputmode="numeric"
              placeholder="其他金额（US$）"
              required
            />
          </div>

          <div class="field-group">
            <label class="field-label" for="donorName">姓名</label>
            <input
              class="field-input"
              id="donorName"
              name="name"
              type="text"
              placeholder="请输入您的姓名（选填）"
            />
          </div>

          <div class="field-group">
            <label class="field-label" for="donorEmail">电子邮件</label>
            <input
              class="field-input"
              id="donorEmail"
              name="email"
              type="email"
              placeholder="请输入您的电子邮件地址（选填）"
            />
          </div>

          <div class="field-group">
            <label class="field-label" for="donorPhone">电话号码</label>
            <input
              class="field-input"
              id="donorPhone"
              name="phone"
              type="tel"
              placeholder="请输入您的电话号码（选填）"
            />
          </div>

          <div class="field-group">
            <label class="field-label" for="donorComment">留言</label>
            <textarea
              class="field-textarea"
              id="donorComment"
              name="comment"
              placeholder="请输入想对项目或受助人说的话（选填）"
            ></textarea>
          </div>

          <label class="checkbox-row" for="anonymousDonation">
            <input id="anonymousDonation" name="anonymous" type="checkbox" />
            <span>匿名捐助</span>
          </label>

          <button class="cta-btn" type="submit">前往支付</button>
          <p class="form-note">提交后将进入支付方式页面，选择 Apple Pay、银行卡、Visa 或 Google Pay。</p>
        </form>
        </section>
      </section>

      <section class="site-footer-nav">
        <img class="site-footer-logo" src="./慈善募捐网站logo设计.png" alt="AidSpring Foundation logo" />
        <div class="site-footer-grid">
          <a class="site-footer-btn" href="./index.html#patientDirectory">立即捐助</a>
          <a class="site-footer-btn" href="./news.html">新闻媒体</a>
          <a class="site-footer-btn" href="./about.html">关于我们</a>
          <a class="site-footer-btn" href="./contact.html">联系我们</a>
          <a class="site-footer-btn" href="./privacy.html">隐私条款</a>
        </div>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("slug") || "";
      const projectName = params.get("project") || "AidSpring Foundation 募捐项目";
      const initialAmount = Number(params.get("amount")) || 0;

      const heroProjectName = document.getElementById("heroProjectName");
      const modalTitle = document.getElementById("modalTitle");
      const summaryProjectName = document.getElementById("summaryProjectName");
      const summaryAmount = document.getElementById("summaryAmount");
      const closeLink = document.getElementById("closeLink");
      const donationForm = document.getElementById("donationForm");
      const amountButtons = Array.from(document.querySelectorAll(".amount-chip"));
      const customAmountInput = document.getElementById("customAmount");
      const hiddenSlug = document.getElementById("hiddenSlug");
      const hiddenProject = document.getElementById("hiddenProject");

      const formatAmount = (value) => `US$${Number(value).toLocaleString("en-US")}`;

      function setSelectedAmount(value, source) {
        const normalizedValue = Number(value) || 0;

        amountButtons.forEach((button) => {
          button.classList.toggle(
            "is-active",
            Number(button.dataset.amount) === normalizedValue && source === "preset"
          );
        });

        if (normalizedValue > 0) {
          customAmountInput.value = String(normalizedValue);
          summaryAmount.textContent = formatAmount(normalizedValue);
        } else {
          summaryAmount.textContent = "请选择捐助金额";
        }
      }

      heroProjectName.textContent = projectName;
      modalTitle.textContent = `支持 ${projectName}`;
      summaryProjectName.textContent = projectName;
      hiddenSlug.value = slug;
      hiddenProject.value = projectName;

      if (slug) {
        closeLink.href = `./project.html?slug=${encodeURIComponent(slug)}`;
      }

      amountButtons.forEach((button) => {
        button.addEventListener("click", () => {
          setSelectedAmount(button.dataset.amount, "preset");
        });
      });

      customAmountInput.addEventListener("input", () => {
        amountButtons.forEach((button) => button.classList.remove("is-active"));
        setSelectedAmount(customAmountInput.value, "custom");
      });

      if (initialAmount > 0) {
        const hasPreset = amountButtons.some(
          (button) => Number(button.dataset.amount) === initialAmount
        );
        setSelectedAmount(initialAmount, hasPreset ? "preset" : "custom");
      }

      donationForm.addEventListener("submit", (event) => {
        event.preventDefault();

        const amount = Number(customAmountInput.value);
        const name = document.getElementById("donorName").value.trim();
        const email = document.getElementById("donorEmail").value.trim();
        const phone = document.getElementById("donorPhone").value.trim();
        const comment = document.getElementById("donorComment").value.trim();
        const anonymous = document.getElementById("anonymousDonation").checked;

        if (!amount || amount <= 0) {
          customAmountInput.focus();
          return;
        }

        const nextParams = new URLSearchParams({
          slug,
          project: projectName,
          amount: String(amount),
        });

        if (name) {
          nextParams.set("name", name);
        }

        if (email) {
          nextParams.set("email", email);
        }

        if (phone) {
          nextParams.set("phone", phone);
        }

        if (comment) {
          nextParams.set("comment", comment);
        }

        if (anonymous) {
          nextParams.set("anonymous", "1");
        }

        window.location.href = `./checkout.html?${nextParams.toString()}`;
      });
    </script>
  </body>
</html>
