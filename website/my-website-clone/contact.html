<!DOCTYPE html>
<html lang="zh-CN" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>联系我们 | 慈愈计划</title>
    <meta
      name="description"
      content="联系慈愈计划团队，提交姓名、电子邮件、主题、电话号码与信息。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-glow page-glow-top"></div>
    <div class="page-glow page-glow-bottom"></div>

    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">
            <img src="./慈善募捐网站logo设计.png" alt="AidSpring Foundation logo" />
          </span>
          <div>
            <h1>AidSpring Foundation</h1>
          </div>
        </div>
        <a class="ghost-link" href="./index.html">返回首页</a>
      </header>

      <main>
        <section class="listing-hero">
          <span class="directory-kicker">Contact Us</span>
          <h2>如果你需要联系我们，可以在这里留下信息</h2>
        </section>

        <section class="detail-section">
          <span class="mini-label">联系表单</span>
          <h3>请填写以下信息</h3>
          <form class="contact-form">
            <label class="form-field">
              <span>姓名</span>
              <input type="text" placeholder="请输入你的姓名" />
            </label>
            <label class="form-field">
              <span>电子邮件</span>
              <input type="email" placeholder="请输入电子邮件" />
            </label>
            <label class="form-field">
              <span>主题</span>
              <input type="text" placeholder="请输入联系主题" />
            </label>
            <label class="form-field">
              <span>电话号码</span>
              <input type="tel" placeholder="请输入电话号码" />
            </label>
            <label class="form-field">
              <span>信息</span>
              <textarea rows="6" placeholder="请输入你的信息"></textarea>
            </label>
            <button class="primary-btn form-submit" type="button">提交信息</button>
          </form>
        </section>

        <section class="site-footer-nav">
          <img class="site-footer-logo" src="./慈善募捐网站logo设计.png" alt="AidSpring Foundation logo" />
          <div class="site-footer-grid">
            <a class="home-link-btn site-footer-btn" href="./index.html#patientDirectory">立即捐助</a>
            <a class="home-link-btn site-footer-btn" href="./news.html">新闻媒体</a>
            <a class="home-link-btn site-footer-btn" href="./about.html">关于我们</a>
            <a class="home-link-btn site-footer-btn" href="./contact.html">联系我们</a>
            <a class="home-link-btn site-footer-btn" href="./privacy.html">隐私条款</a>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
